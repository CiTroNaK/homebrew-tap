name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update cask formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA: ${{ github.event.client_payload.sha256 }}
        run: |
          python3 << 'SCRIPT'
          import os, re
          version = os.environ["VERSION"]
          sha = os.environ["SHA"]
          path = "Casks/quick-access-for-pass.rb"
          with open(path) as f:
              content = f.read()
          content = re.sub(r'version ".*?"', f'version "{version}"', content, count=1)
          content = re.sub(r'sha256 ".*?"', f'sha256 "{sha}"', content, count=1)
          with open(path, "w") as f:
              f.write(content)
          SCRIPT

      - name: Verify update
        run: cat Casks/quick-access-for-pass.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/quick-access-for-pass.rb
          git commit -m "Update quick-access-for-pass to ${VERSION}"
          git push
